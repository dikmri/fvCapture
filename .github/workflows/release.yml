name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            package: fvCapture-windows-x86_64
          - name: macos
            os: macos-latest
            package: fvCapture-macos
          - name: linux
            os: ubuntu-latest
            package: fvCapture-linux-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libpipewire-0.3-dev \
            libdbus-1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace

      - name: Build
        run: cargo build --workspace --release

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package, dist | Out-Null
          Copy-Item target/release/fvCapture.exe package/
          Copy-Item target/release/fv-capture.exe package/
          Copy-Item README.md package/
          Copy-Item LICENSE package/
          Compress-Archive -Path package/* -DestinationPath dist/${{ matrix.package }}.zip

      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p package dist
          cp target/release/fvCapture package/
          cp target/release/fv-capture package/
          cp README.md package/
          cp LICENSE package/
          tar -czf dist/${{ matrix.package }}.tar.gz -C package .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: dist/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
