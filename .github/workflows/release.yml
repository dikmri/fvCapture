name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            package: fvCapture-windows-x86_64
          - name: macos
            os: macos-latest
            package: fvCapture-macos
          - name: linux
            os: ubuntu-latest
            package: fvCapture-linux-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgbm-dev \
            libdrm-dev \
            libpipewire-0.3-dev \
            libdbus-1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check generated README
        run: python scripts/build_readme.py --check

      - name: Test
        run: cargo test --workspace

      - name: Build
        run: cargo build --workspace --release

      - name: Install bundled FFmpeg
        run: npm install --prefix .ffmpeg ffmpeg-static@5.3.0

      - name: Stage bundled FFmpeg
        run: node scripts/stage_ffmpeg_static.mjs package/third_party/ffmpeg

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package, dist | Out-Null
          Copy-Item target/release/fvCapture.exe package/
          Copy-Item target/release/fv-capture.exe package/
          Copy-Item README.md package/
          Copy-Item LICENSE package/
          Copy-Item THIRD_PARTY_NOTICES.md package/
          New-Item -ItemType Directory -Force -Path package/third_party/fonts | Out-Null
          Copy-Item assets/fonts/MPLUS1-OFL.txt package/third_party/fonts/
          Compress-Archive -Path package/* -DestinationPath dist/${{ matrix.package }}.zip

      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p package dist
          cp target/release/fvCapture package/
          cp target/release/fv-capture package/
          cp README.md package/
          cp LICENSE package/
          cp THIRD_PARTY_NOTICES.md package/
          mkdir -p package/third_party/fonts
          cp assets/fonts/MPLUS1-OFL.txt package/third_party/fonts/
          tar -czf dist/${{ matrix.package }}.tar.gz -C package .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: dist/*

      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $notes = "docs/releases/${{ github.ref_name }}.md"
          if (Test-Path $notes) {
            Copy-Item $notes release-notes.md
          } else {
            Set-Content -Path release-notes.md -Value "# ${{ github.ref_name }}`n`n- リリースしました。"
          }

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release-notes.md
